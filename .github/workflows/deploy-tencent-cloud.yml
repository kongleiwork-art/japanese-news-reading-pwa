name: Deploy to Tencent Cloud

on:
  workflow_dispatch:

concurrency:
  group: tencent-cloud-production
  cancel-in-progress: false

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Configure SSH
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
          TENCENT_SSH_PORT: ${{ secrets.TENCENT_SSH_PORT }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?Missing GitHub secret TENCENT_HOST}"
          : "${TENCENT_SSH_KEY:?Missing GitHub secret TENCENT_SSH_KEY}"

          SSH_PORT="${TENCENT_SSH_PORT:-22}"
          mkdir -p ~/.ssh
          printf "%s" "$TENCENT_SSH_KEY" > ~/.ssh/tencent_cloud_key
          chmod 600 ~/.ssh/tencent_cloud_key
          ssh-keyscan -p "$SSH_PORT" -H "$TENCENT_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        env:
          TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
          TENCENT_USER: ${{ secrets.TENCENT_USER }}
          TENCENT_SSH_PORT: ${{ secrets.TENCENT_SSH_PORT }}
          TENCENT_APP_DIR: ${{ secrets.TENCENT_APP_DIR }}
          TENCENT_REPO_URL: ${{ secrets.TENCENT_REPO_URL }}
        run: |
          set -euo pipefail
          : "${TENCENT_HOST:?Missing GitHub secret TENCENT_HOST}"
          : "${TENCENT_USER:?Missing GitHub secret TENCENT_USER}"

          SSH_PORT="${TENCENT_SSH_PORT:-22}"
          APP_DIR="${TENCENT_APP_DIR:-/var/www/japanese-news-pwa}"
          REPO_URL="${TENCENT_REPO_URL:-https://github.com/${GITHUB_REPOSITORY}.git}"
          BRANCH="${GITHUB_REF_NAME:-main}"

          ssh -p "$SSH_PORT" -i ~/.ssh/tencent_cloud_key "$TENCENT_USER@$TENCENT_HOST" \
            "APP_DIR='$APP_DIR' REPO_URL='$REPO_URL' BRANCH='$BRANCH' bash -s" 2>&1 <<'REMOTE' | tee remote-deploy.log
          set -euo pipefail
          set -x

          retry() {
            local attempt=1
            local max_attempts=5
            local delay=10

            until "$@"; do
              if [ "$attempt" -ge "$max_attempts" ]; then
                return 1
              fi

              echo "Command failed, retrying in ${delay}s: $*"
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
            done
          }

          LOCK_NAME="$(basename "$APP_DIR" | tr -c '[:alnum:]_.-' '_')"
          exec 9>"/tmp/$LOCK_NAME.deploy.lock"
          flock -w 300 9

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR"
            retry git -c http.version=HTTP/1.1 clone --depth=1 --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          find .git -name "*.lock" -type f -mmin +5 -print -delete || true
          git status --short || true
          git rev-parse --short HEAD || true
          retry git -c http.version=HTTP/1.1 fetch --prune --depth=1 origin "$BRANCH"
          git reset --hard FETCH_HEAD
          retry npm ci
          npm run build
          pm2 startOrReload ecosystem.config.cjs --env production
          pm2 save
          REMOTE
        shell: bash

      - name: Upload deployment diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics
          path: remote-deploy.log
          if-no-files-found: ignore

      - name: Summarize deployment diagnostics
        if: failure()
        run: |
          {
            echo "## Remote deployment log"
            echo '```text'
            tail -n 120 remote-deploy.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
